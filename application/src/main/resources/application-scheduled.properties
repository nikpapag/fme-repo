# Example profile for enabling scheduled background simulation
# To use: java -jar application.jar --spring.profiles.active=scheduled
# Or: export SPRING_PROFILES_ACTIVE=scheduled

# Enable scheduled background simulation
simulation.scheduled.enabled=true

# Run every 5 seconds after previous execution completes
simulation.scheduled.fixedDelayMs=5000

# Minimum events per treatment per metric
simulation.scheduled.minPerTreatment=350

# Wait 10 seconds after JVM startup before first run
simulation.scheduled.initialDelayMs=10000

# Optional: Override other simulation settings for scheduled runs
simulation.maxSyntheticUsers=25000
simulation.eventDelayMs=3000
