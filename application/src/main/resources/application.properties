spring.application.name=workshop

split.sdkKey=${SPLIT_SDK_KEY:localhost}
split.trafficType=${SPLIT_TRAFFIC_TYPE:user}
split.eventsEnabled=${SPLIT_EVENTS_ENABLED:true}
split.eventFlushIntervalMs=${SPLIT_EVENT_FLUSH_INTERVAL_MS:10000}
split.eventsQueueSize=${SPLIT_EVENTS_QUEUE_SIZE:500}
split.blockUntilReady=true
split.blockUntilReadyTimeoutMs=10000
# Impressions are sent by getTreatment only — DEBUG + low refresh posts them within seconds
split.impressionsMode=DEBUG
split.impressionsRefreshRate=5

simulation.minPerTreatment=350
simulation.maxSyntheticUsers=25000
# Delay between getTreatment (impressions) and track() per metric step
simulation.eventDelayMs=3000

# Scheduled background simulation (runs periodically as a thread)
# Set enabled=true to start automatic simulation every fixedDelayMs
simulation.scheduled.enabled=false
simulation.scheduled.minPerTreatment=350
# Wait 10 seconds after JVM startup before first run
simulation.scheduled.initialDelayMs=10000
# Run every 5 seconds (5000ms) after previous execution completes
simulation.scheduled.fixedDelayMs=5000
